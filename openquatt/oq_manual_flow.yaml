# ==============================================================================
# OpenQuatt - Manual Flow Service Task
# ==============================================================================
#
# Goal:
#   Circulate water inside the shared CM100 service container using a temporary
#   flow setpoint. Flow-control remains the sole writer of pump iPWM.
#
# ==============================================================================

globals:
  - id: oq_manual_flow_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_quick_flow_test_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_quick_flow_test_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_quick_flow_test_remaining_s
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_quick_flow_test_target_ipwm
    type: int
    restore_value: false
    initial_value: '400'

  - id: oq_manual_flow_status_value
    type: std::string
    restore_value: false
    initial_value: '"IDLE"'

number:
  - platform: template
    id: oq_manual_flow_setpoint_lph
    name: "Manual flow service setpoint"
    internal: true
    icon: mdi:waves-arrow-right
    unit_of_measurement: "L/h"
    mode: slider
    min_value: 0
    max_value: 1500
    step: 10
    restore_value: false
    optimistic: true
    initial_value: 800
    entity_category: config
    web_server:
      sorting_group_id: oq_hydraulics

button:
  - platform: template
    id: oq_manual_flow_start
    name: "Manual Flow Start"
    internal: true
    icon: mdi:water-pump
    entity_category: config
    web_server:
      sorting_group_id: oq_hydraulics
    on_press:
      - lambda: |-
          oq_manual_flow::runtime().start();

  - platform: template
    id: oq_manual_flow_abort
    name: "Manual Flow Abort"
    internal: true
    icon: mdi:stop-circle-outline
    entity_category: config
    web_server:
      sorting_group_id: oq_hydraulics
    on_press:
      - lambda: |-
          oq_manual_flow::runtime().abort_or_clear();

  - platform: template
    id: oq_manual_flow_apply_heating
    name: "Apply Manual Flow To Heating"
    internal: true
    icon: mdi:radiator
    entity_category: config
    web_server:
      sorting_group_id: oq_hydraulics
    on_press:
      - lambda: |-
          oq_manual_flow::runtime().apply_to_heating();

  - platform: template
    id: oq_manual_flow_apply_cooling
    name: "Apply Manual Flow To Cooling"
    internal: true
    icon: mdi:snowflake
    entity_category: config
    web_server:
      sorting_group_id: oq_hydraulics
    on_press:
      - lambda: |-
          oq_manual_flow::runtime().apply_to_cooling();

switch:
  - platform: template
    id: oq_quick_flow_test_switch
    name: "Quick flow test"
    internal: true
    icon: mdi:water-pump
    entity_category: config
    lambda: |-
      return id(oq_quick_flow_test_active);
    turn_on_action:
      - lambda: |-
          oq_manual_flow::runtime().start_quick_test((uint32_t) millis());
    turn_off_action:
      - lambda: |-
          oq_manual_flow::runtime().abort_quick_test();
    web_server:
      sorting_group_id: oq_hydraulics

interval:
  - interval: 1s
    then:
      - lambda: |-
          oq_manual_flow::runtime().tick((uint32_t) millis());
