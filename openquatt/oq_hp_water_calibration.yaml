# ==============================================================================
# OpenQuatt - HP Water Sensor Calibration
# ==============================================================================
#
# Goal:
#   Run a manual CM100 service task that circulates water without compressor
#   demand, waits for the HP water sensors to equalize, and proposes relative
#   offsets for HP water-in/out sensors. Applying the proposal is a separate
#   user action.
#
# ==============================================================================

globals:
  - id: oq_hp_water_calibration_active
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_hp_water_calibration_abort
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: oq_hp_water_calibration_phase
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_hp_water_calibration_target_ipwm
    type: int
    restore_value: false
    initial_value: '1000'

  - id: oq_hp_water_calibration_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: oq_hp_water_calibration_remaining_s
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_hp_water_calibration_spread_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_supply_delta_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_stable_progress_s
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_hp_water_calibration_stable_required_s
    type: int
    restore_value: false
    initial_value: '0'

  - id: oq_hp_water_calibration_result_reference_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_spread_before_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_expected_spread_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_hp1_in_raw_avg_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_hp1_out_raw_avg_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_hp2_in_raw_avg_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_result_hp2_out_raw_avg_c
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: oq_hp_water_calibration_status_value
    type: std::string
    restore_value: false
    initial_value: '"IDLE"'

number:
  - platform: template
    id: hp1_water_in_temp_offset
    name: "HP1 water in temperature offset"
    internal: true
    icon: mdi:thermometer-plus
    unit_of_measurement: "°C"
    mode: slider
    min_value: -2
    max_value: 2
    step: 0.01
    restore_value: true
    optimistic: true
    initial_value: 0
    entity_category: config
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_temperatures

