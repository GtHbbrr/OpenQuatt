button:
  - platform: template
    id: oq_hp_water_calibration_start
    name: "HP Water Calibration Start"
    internal: true
    icon: mdi:thermometer-sync
    entity_category: config
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_temperatures
    on_press:
      - lambda: |-
          oq_hp_water_calibration::runtime().start(
              oq_hp_water_calibration::make_runtime_config(${oq_flow_loop_s}),
              (uint32_t) millis());

  - platform: template
    id: oq_hp_water_calibration_abort_btn
    name: "HP Water Calibration Abort"
    internal: true
    icon: mdi:stop-circle-outline
    entity_category: config
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_temperatures
    on_press:
      - lambda: |-
          oq_hp_water_calibration::runtime().abort_or_clear();

  - platform: template
    id: oq_hp_water_calibration_apply
    name: "Apply HP Water Calibration Offsets"
    internal: true
    icon: mdi:check-circle-outline
    entity_category: config
    disabled_by_default: true
    web_server:
      sorting_group_id: oq_temperatures
    on_press:
      - lambda: |-
          oq_hp_water_calibration::runtime().apply(
              oq_hp_water_calibration::make_runtime_config(${oq_flow_loop_s}));

interval:
  - interval: ${oq_flow_loop_s}s
    startup_delay: 5400ms
    then:
      - lambda: |-
          oq_hp_water_calibration::runtime().tick(
              oq_hp_water_calibration::make_runtime_config(${oq_flow_loop_s}),
              (uint32_t) millis());
