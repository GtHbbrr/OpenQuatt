# ==============================================================================
# OpenQuatt - MQTT Ingress
# ==============================================================================
#
# Goal:
#   Accept optional external input values over MQTT.
#
# Scope:
#   - Uses a small OpenQuatt-specific ESP-IDF MQTT client, not ESPHome's global
#     MQTT component.
#   - No MQTT discovery, entity export, logging, telemetry snapshots or publish
#     profiles are generated.
#   - Subscribe topics are fixed by substitution and shown read-only in the web
#     app through /mqtt/status.
#   - Current inputs: cooling dew point, outside temperature, room temperature,
#     room setpoint, heating enable and cooling enable.
#   - Future inputs should follow the same openquatt/${device_name}/input/...
#     topic convention.
#
# ==============================================================================

openquatt_mqtt_config:
  id: oq_mqtt_config
  bootstrap_broker: "${mqtt_bootstrap_broker}"
  bootstrap_port: ${mqtt_bootstrap_port}
  bootstrap_username: "${mqtt_bootstrap_username}"
  bootstrap_password: "${mqtt_bootstrap_password}"
  dew_point_topic: "${mqtt_cooling_dew_point_topic}"
  dew_point_stale: ${mqtt_cooling_dew_point_stale_s}s
  dew_point_sensor: mqtt_cooling_dew_point
  dew_point_age_sensor: mqtt_cooling_dew_point_age
  dew_point_valid_binary_sensor: mqtt_cooling_dew_point_valid
  outside_temperature_topic: "${mqtt_outside_temperature_topic}"
  outside_temperature_stale: ${mqtt_outside_temperature_stale_s}s
  outside_temperature_sensor: mqtt_outside_temperature
  outside_temperature_age_sensor: mqtt_outside_temperature_age
  outside_temperature_valid_binary_sensor: mqtt_outside_temperature_valid
  room_temperature_topic: "${mqtt_room_temperature_topic}"
  room_temperature_stale: ${mqtt_room_temperature_stale_s}s
  room_temperature_sensor: mqtt_room_temperature
  room_temperature_age_sensor: mqtt_room_temperature_age
  room_temperature_valid_binary_sensor: mqtt_room_temperature_valid
  room_setpoint_topic: "${mqtt_room_setpoint_topic}"
  room_setpoint_stale: ${mqtt_room_setpoint_stale_s}s
  room_setpoint_sensor: mqtt_room_setpoint
  room_setpoint_age_sensor: mqtt_room_setpoint_age
  room_setpoint_valid_binary_sensor: mqtt_room_setpoint_valid
  heating_enable_topic: "${mqtt_heating_enable_topic}"
  heating_enable_stale: ${mqtt_heating_enable_stale_s}s
  heating_enable_binary_sensor: mqtt_heating_enable
  heating_enable_age_sensor: mqtt_heating_enable_age
  heating_enable_valid_binary_sensor: mqtt_heating_enable_valid
  cooling_enable_topic: "${mqtt_cooling_enable_topic}"
  cooling_enable_stale: ${mqtt_cooling_enable_stale_s}s
  cooling_enable_binary_sensor: mqtt_cooling_enable
  cooling_enable_age_sensor: mqtt_cooling_enable_age
  cooling_enable_valid_binary_sensor: mqtt_cooling_enable_valid
  default_enabled: ${mqtt_default_enabled}

sensor:
  - platform: template
    id: mqtt_cooling_dew_point
    name: "MQTT Cooling Dew Point"
    icon: mdi:water-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never
    web_server:
      sorting_group_id: oq_ha_inputs

  - platform: template
    id: mqtt_cooling_dew_point_age
    name: "MQTT Cooling Dew Point Age"
    icon: mdi:timer-outline
    unit_of_measurement: "s"
    accuracy_decimals: 0
